{% extends 'base.html' %}
{% block title %}管理后台登录 - CDK Box{% endblock %}
{% block content %}
<div class="card center-card">
    <h1>管理后台</h1>
    <form method="POST" action="{{ url_for('admin_do_login') }}">
        <input type="text" name="username" placeholder="管理员用户名" required autofocus>
        <input type="password" name="password" placeholder="密码" required>
        <button type="submit" class="btn btn-primary full-width">登录</button>
    </form>
</div>
{% endblock %}
